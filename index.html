<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Autohaus Rheinblick – Unsere Website befindet sich derzeit im Aufbau." />
  <title>Autohaus Rheinblick – Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --white: #f5f5f0;
      --black: #080808;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Michroma', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,255,255,0.02) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 0;
      margin-bottom: 6rem;
      margin-left: -95px;
    }

    .logo-mark {
      width: 180px;
      height: auto;
      flex-shrink: 0;
    }

    .brand-name {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .wordmark-pre,
    .wordmark-main {
      font-family: 'Michroma', sans-serif;
      font-weight: 400;
      font-size: 2.81rem;
      letter-spacing: 8pt;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1.2;
    }

    .coming-soon {
      font-family: 'Michroma', sans-serif;
      font-weight: 400;
      font-size: 1.56rem;
      letter-spacing: 5.5pt;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 45px;
    }

    .subtitle {
      font-family: 'Michroma', sans-serif;
      font-weight: 400;
      font-size: 0.75rem;
      letter-spacing: 2pt;
      color: rgba(245,245,240,0.55);
      line-height: 1.8;
      max-width: 460px;
    }

    .email {
      display: block;
      margin-top: 80px;
      font-family: 'Michroma', sans-serif;
      font-weight: 400;
      font-size: 0.81rem;
      letter-spacing: 3pt;
      color: rgba(245,245,240,0.6);
      text-decoration: none;
      text-transform: lowercase;
    }

    .email:hover {
      color: var(--white);
    }

    .bottom-mark {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      opacity: 0.3;
      z-index: 1;
    }

    .bottom-mark-line {
      width: 28px;
      height: 1px;
      background: var(--white);
    }

    .bottom-mark-text {
      font-family: 'Michroma', sans-serif;
      font-weight: 400;
      font-size: 0.75rem;
      letter-spacing: 4pt;
      color: var(--white);
      text-transform: uppercase;
    }

    @media (max-width: 560px) {
      .brand {
        flex-direction: column;
        gap: 1.4rem;
        align-items: center;
        margin-left: 0;
      }
      .brand-name {
        align-items: center;
        text-align: center;
      }
      .wordmark-pre,
      .wordmark-main {
        font-size: 1.6rem;
        letter-spacing: 4pt;
      }
      .coming-soon {
        font-size: 1rem;
        letter-spacing: 4pt;
      }
    }

    @media (max-width: 480px) {
      .subtitle { max-width: 290px; }
    }
  </style>
</head>
